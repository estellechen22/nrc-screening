<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>主播风险筛查系统 · 洛克王国世界</title>
  <style>
    :root {
      --bg-deep:#070a14; --bg:#0c1124; --bg-card:#111832; --bg-card-hover:#151d3d;
      --text:#e4e9ff; --muted:#8891b5; --line:#1e2a4f; --line-light:#263461;
      --gold:#f5b800; --gold-soft:rgba(245,184,0,.18); --gold-glow:rgba(245,184,0,.35);
      --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --info:#60a5fa;
      --ok-bg:rgba(34,197,94,.1); --warn-bg:rgba(245,158,11,.1); --bad-bg:rgba(239,68,68,.1); --info-bg:rgba(96,165,250,.1);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft Yahei",sans-serif;color:var(--text);background:var(--bg-deep)}
    .wrap{max-width:1260px;margin:0 auto;padding:20px 20px 40px}
    .title{font-size:28px;font-weight:800;margin:0 0 4px;letter-spacing:-.3px}
    .title span{background:linear-gradient(135deg,var(--gold),#e8a400);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{color:var(--muted);font-size:14px;margin-bottom:22px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
    .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg-card);border-radius:14px;padding:4px;width:fit-content}
    .tab{border:none;background:transparent;color:var(--muted);padding:10px 20px;border-radius:11px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s}
    .tab:hover{color:var(--text)}
    .tab.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}
    .panel{background:var(--bg-card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
    .row{display:grid;grid-template-columns:1fr auto;gap:10px}.row3{display:grid;grid-template-columns:1fr 180px auto;gap:10px}
    input,select,button,textarea{background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:14px;outline:none;transition:border-color .2s}
    input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
    textarea{width:100%;min-height:160px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    button{background:linear-gradient(135deg,var(--gold) 0%,#d49800 100%);color:#0a0f1f;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s}
    button:hover{box-shadow:0 4px 16px var(--gold-glow)}
    button.secondary{background:var(--bg);color:var(--text);border:1px solid var(--line)}
    button.secondary:hover{background:var(--bg-card-hover);border-color:var(--line-light);box-shadow:none}
    button.ghost{background:transparent;color:var(--muted);border:none;padding:6px 10px;font-weight:500}
    .hint{color:var(--muted);font-size:13px;margin-top:8px}.status{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px}
    .status.info{background:var(--info-bg);border:1px solid rgba(96,165,250,.25)}.status.ok{background:var(--ok-bg);border:1px solid rgba(34,197,94,.25)}
    .status.warn{background:var(--warn-bg);border:1px solid rgba(245,158,11,.25)}.status.bad{background:var(--bad-bg);border:1px solid rgba(239,68,68,.25)}
    .grid{display:grid;gap:14px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .metric{padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--bg)}
    .metric .k{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}.metric .v{font-size:22px;font-weight:700;margin-top:5px}

    /* API status banner */
    .api-banner{padding:12px 16px;border-radius:12px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .api-banner.all-ok{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);color:var(--ok)}
    .api-banner.warning{background:var(--warn-bg);border:1px solid rgba(245,158,11,.25);color:var(--warn)}
    .api-banner .api-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* Search → Results transition */
    .search-card{transition:all .3s}
    .search-card.compact{padding:12px 20px;margin-bottom:8px}
    .search-card.compact .row{grid-template-columns:1fr auto auto;gap:8px}
    .back-link{display:inline-flex;align-items:center;gap:4px;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:12px;border:none;background:none;padding:0}
    .back-link:hover{color:var(--gold)}

    /* Animated status card */
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    .screening-card{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:var(--bg-card);padding:0}
    .screening-card .shimmer-bar{height:2px;background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 2s ease-in-out infinite}
    .screening-card .sc-body{padding:24px;text-align:center}
    .screening-card .sc-title{font-size:18px;font-weight:700;margin-bottom:6px}
    .screening-card .sc-sub{color:var(--muted);font-size:13px;margin-bottom:16px}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .loading-dots{animation:pulse 1.5s ease-in-out infinite}

    /* Step trace */
    .trace-steps{display:flex;flex-direction:column;gap:6px;max-width:360px;margin:0 auto}
    .trace-step{display:flex;align-items:center;gap:10px;font-size:12px;padding:6px 0}
    .trace-step .ts-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;border:1px solid var(--line);background:var(--bg)}
    .trace-step.done .ts-dot{border-color:var(--ok);color:var(--ok)}.trace-step.done .ts-label{color:var(--muted)}
    .trace-step.active .ts-dot{border-color:var(--gold);color:var(--gold);animation:pulse 1.2s ease-in-out infinite}.trace-step.active .ts-label{color:var(--gold);font-weight:600}
    .trace-step.pending .ts-dot{opacity:.4}.trace-step.pending .ts-label{opacity:.4}

    /* Gauge and verdict */
    .gauge-wrap{display:flex;align-items:center;gap:20px;margin-bottom:16px}
    .gauge-ring{position:relative;width:120px;height:120px;flex-shrink:0}
    .gauge-ring svg{transform:rotate(-90deg)}.gauge-ring .score-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800;font-size:32px;line-height:1.2}
    .gauge-ring .score-label{font-size:11px;font-weight:500;color:var(--muted)}
    .verdict-banner{flex:1;padding:16px 20px;border-radius:12px;font-weight:700;font-size:15px}
    .verdict-banner.approve{border:1px solid rgba(34,197,94,.3);background:var(--ok-bg);color:var(--ok)}
    .verdict-banner.review{border:1px solid rgba(245,158,11,.3);background:var(--warn-bg);color:var(--warn)}
    .verdict-banner.reject{border:1px solid rgba(239,68,68,.3);background:var(--bad-bg);color:var(--bad)}

    /* Layer cards */
    .layer{margin-top:8px;border:1px solid var(--line);border-radius:12px;overflow:hidden;border-left:4px solid var(--line);transition:border-color .2s;scroll-margin-top:100px}
    .layer.low-risk{border-left-color:var(--ok)}.layer.medium-risk{border-left-color:var(--warn)}.layer.high-risk{border-left-color:var(--bad)}
    .layer-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg);cursor:pointer;font-weight:600;font-size:14px;gap:12px}
    .layer-hd:hover{background:#0f1630}
    .layer-hd .layer-icon{font-size:18px;margin-right:4px}
    .badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid;white-space:nowrap}
    .badge.low-risk{color:var(--ok);border-color:rgba(34,197,94,.35)}.badge.medium-risk{color:var(--warn);border-color:rgba(245,158,11,.35)}.badge.high-risk{color:var(--bad);border-color:rgba(239,68,68,.35)}
    .layer-bd{display:none;padding:16px;background:#0d1327;font-size:13px}.layer.open .layer-bd{display:block}
    .layer-chevron{transition:transform .25s;color:var(--muted);font-size:12px}.layer.open .layer-chevron{transform:rotate(180deg)}

    /* Chip tags */
    .chip-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}.chip{padding:4px 10px;border-radius:8px;font-size:12px;border:1px solid;font-weight:500}
    .chip.info{border-color:rgba(96,165,250,.35);color:#93bbfd;background:rgba(96,165,250,.08)}
    .chip.warning{border-color:rgba(245,158,11,.35);color:#fbbf24;background:rgba(245,158,11,.08)}
    .chip.critical{border-color:rgba(239,68,68,.35);color:#f87171;background:rgba(239,68,68,.08)}

    /* Anchor nav */
    .anchor-nav{position:sticky;top:20px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;z-index:5}
    .anchor-dot{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;color:var(--muted);background:var(--bg-card);border:1px solid var(--line);cursor:pointer;transition:all .2s;text-decoration:none}
    .anchor-dot:hover{color:var(--text);border-color:var(--line-light)}
    .anchor-dot:target,.anchor-dot.active{color:var(--gold);border-color:var(--gold-soft);background:var(--gold-soft)}

    /* Tables */
    table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:10px 12px;text-align:left}th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
    tr:hover td{background:rgba(245,184,0,.03)}
    tr:nth-child(even) td{background:rgba(255,255,255,.015)}

    .hidden{display:none}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  </style>
</head>
<body>
<div class="wrap">
  <h1 class="title"><span>洛克王国世界</span> · 主播风险筛查</h1>
  <div class="sub">
    <span>六层AI筛查 · YouTube 创作者背调 · v3.2 · 正常加载中...</span>
    <span id="configHint" style="font-size:12px;opacity:.7;"></span>
  </div>

  <!-- API 状态横幅 -->
  <div id="apiBanner" class="api-banner hidden"></div>

  <!-- Top tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="screen">🗂️ 创作者筛查</button>
    <button class="tab" data-tab="history">📋 历史记录</button>
  </div>

  <!-- ===== 单条筛查 ===== -->
  <section id="tab-screen" class="tab-pane">

    <!-- 搜索视图（初始状态） -->
    <div id="searchView">
      <div class="panel" id="searchCard">
        <div class="row" style="grid-template-columns:1fr auto;">
          <textarea id="urlInput" rows="4" placeholder="输入 YouTube 创作者链接，每行一个"></textarea>
          <button id="startBtn" style="align-self:flex-start;">开始筛查</button>
        </div>
        <div class="hint" id="urlHint">输入 1 条 = 单条深度筛查 · 输入多条 = 批量筛查（每行一个URL）</div>
      </div>
    </div>

    <!-- 筛查进行中 / 批量进度卡片 -->
    <div id="screeningCard" class="screening-card hidden">
      <div class="shimmer-bar"></div>
      <div class="sc-body">
        <div class="sc-title"><span class="loading-dots" id="screeningTitle">正在进行六层AI筛查</span></div>
        <div class="sc-sub" id="screeningSub">提交任务成功，正在启动分析引擎...</div>
        <div class="trace-steps" id="traceSteps"></div>
      </div>
    </div>

    <!-- 结果视图（单条结果） -->
    <div id="resultView" class="hidden">
      <button class="back-link" id="backToSearch">← 返回搜索</button>

      <!-- 综合评分 & 判定 -->
      <div class="panel">
        <div class="gauge-wrap">
          <div class="gauge-ring">
            <svg viewBox="0 0 120 120" width="120" height="120">
              <circle cx="60" cy="60" r="50" fill="none" stroke="var(--bg-card)" stroke-width="8"/>
              <circle id="gaugeArc" cx="60" cy="60" r="50" fill="none" stroke="var(--gold)" stroke-width="8" stroke-linecap="round" stroke-dasharray="0 314" stroke-dashoffset="0"/>
            </svg>
            <div class="score-text"><div id="scoreVal">-</div><div class="score-label">综合评分</div></div>
          </div>
          <div class="verdict-banner review" id="verdictBanner">
            <div style="font-size:12px;font-weight:500;margin-bottom:4px;opacity:.8;">筛查判定</div>
            <div id="verdictVal" style="font-size:20px;">-</div>
          </div>
        </div>
        <div class="grid grid-4" style="margin-bottom:14px;">
          <div class="metric"><div class="k">创作者</div><div class="v" id="creatorVal" style="font-size:15px;">-</div></div>
          <div class="metric"><div class="k">平台</div><div class="v" id="platformVal" style="font-size:15px;">-</div></div>
          <div class="metric"><div class="k">粉丝数</div><div class="v" id="subsVal" style="font-size:15px;">-</div></div>
          <div class="metric"><div class="k">国家/地区</div><div class="v" id="countryVal" style="font-size:15px;">-</div></div>
        </div>
        <div id="vetoBlock" class="status bad hidden"></div>
        <div class="actions">
          <button id="singleExportBtn" class="secondary">📥 导出 Excel 报告</button>
        </div>
      </div>

      <!-- 层导航 + 展开/折叠 -->
      <div class="anchor-nav" id="anchorNav">
        <span style="color:var(--muted);font-size:11px;margin-right:4px;">快速跳转：</span>
        <a class="anchor-dot" href="#layer-1">📊 L1</a>
        <a class="anchor-dot" href="#layer-2">📝 L2</a>
        <a class="anchor-dot" href="#layer-3">🛡️ L3</a>
        <a class="anchor-dot" href="#layer-4">🏷️ L4</a>
        <a class="anchor-dot" href="#layer-5">🎮 L5</a>
        <a class="anchor-dot" href="#layer-6">📈 L6</a>
        <span style="flex:1;"></span>
        <button class="ghost" id="expandAllBtn">全部展开</button>
        <button class="ghost" id="collapseAllBtn">全部折叠</button>
      </div>

      <!-- 六层结果 -->
      <div id="layersBox"></div>
    </div>

    <!-- 批量结果表（出现在同 Tab 内） -->
    <div id="batchResultPanel" class="hidden">
      <button class="back-link" id="backToSearch2">← 返回搜索</button>
      <div class="panel">
        <div id="batchStatusInline" class="status info"></div>
        <div class="actions" style="margin-bottom:10px;">
          <button id="batchExportInline" class="secondary">📥 导出该批次 Excel</button>
        </div>
      </div>
      <div class="panel">
        <table><thead><tr><th>创建时间</th><th>创作者</th><th>平台</th><th>状态</th><th>评分</th><th>判定</th><th>操作</th></tr></thead><tbody id="batchTbody"></tbody></table>
      </div>
    </div>
  </section>

  <!-- ===== 历史记录 ===== -->
  <section id="tab-history" class="tab-pane hidden">
    <div class="panel"><div class="row3"><input id="searchInput" placeholder="按名称/handle/URL 搜索" /><select id="verdictFilter"><option value="">全部判定</option><option value="approve">通过</option><option value="review">人工复核</option><option value="reject">拒绝</option></select><button id="historyBtn" class="secondary">查询</button></div></div>
    <div class="panel"><table><thead><tr><th>创建时间</th><th>创作者</th><th>平台</th><th>评分</th><th>判定</th><th>操作</th></tr></thead><tbody id="historyTbody"></tbody></table></div>
  </section>
</div>

<script>
console.log('=== NRC Screening v3.2 - JS starting ===');
try{
// ==================== 工具函数 ====================
const tabs=document.querySelectorAll('.tab');
const panes={screen:gid('tab-screen'),history:gid('tab-history')};
let currentScreenId='';let currentBatchId='';
let allLayersExpanded=false;

tabs.forEach(btn=>btn.addEventListener('click',()=>{
  tabs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  Object.values(panes).forEach(p=>p.classList.add('hidden'));panes[btn.dataset.tab].classList.remove('hidden');
}));

function gid(id){return document.getElementById(id)}
function esc(s){return String(s??'').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function verdictText(v){if(v==='approve')return '通过';if(v==='review')return '人工复核';if(v==='reject')return '拒绝';return v||'-'}
function fmtScore(s){return typeof s==='number'?`${s}/100`:'-'}
function setStatus(type,text,target){target.className=`status ${type}`;target.textContent=text;target.classList.remove('hidden')}

// ==================== 改动1: API 预检横幅 ====================
async function loadConfig(){
  const [h,c]=await Promise.all([
    fetch('/api/health').then(r=>r.json()),
    fetch('/api/config-status').then(r=>r.json())
  ]);
  const el=gid('configHint');
  if(el) el.innerHTML=`<span style="color:${h.db_ok?'var(--ok)':'var(--bad)'};">●</span> 数据库${h.db_ok?'正常':'异常'} · ${c.ready?'全部API就绪':'部分Key缺失'}`;

  const banner=gid('apiBanner');
  if(c.ready){
    banner.className='api-banner all-ok';banner.classList.remove('hidden');
    banner.innerHTML=`<span class="api-dot" style="background:var(--ok);"></span> 全部 API 就绪 — YouTube & Perspective 已连接`;
  }else{
    const missing=c.missing||[];
    banner.className='api-banner warning';banner.classList.remove('hidden');
    banner.innerHTML=`<span class="api-dot" style="background:var(--warn);"></span> <strong>部分 API 未配置：</strong>${missing.join(', ')||'无'} — 相应层级将以占位数据运行`;
  }
}

// ==================== 改动2: 步骤追踪日志 ====================
const TRACE_PHASES=[
  {id:'L1',name:'数据真实性验证',icon:'📊'},
  {id:'L2',name:'内容历史回溯',icon:'📝'},
  {id:'L3',name:'政治敏感检测',icon:'🛡️'},
  {id:'L4',name:'品牌安全评分',icon:'🏷️'},
  {id:'L5',name:'竞争关系分析',icon:'🎮'},
  {id:'L6',name:'影响力真实性',icon:'📈'},
];

function buildTraceSteps(){
  return TRACE_PHASES.map(p=>`
    <div class="trace-step pending" id="trace-${p.id}">
      <div class="ts-dot">${p.icon}</div>
      <span class="ts-label">${p.name}</span>
    </div>`).join('');
}

function updateTraceStep(round){
  const total=TRACE_PHASES.length;
  const doneIdx=Math.min(Math.floor(round/10),total);
  for(let i=0;i<total;i++){
    const el=gid('trace-'+TRACE_PHASES[i].id);
    if(!el)continue;
    el.className='trace-step '+(i<doneIdx?'done':i===doneIdx?'active':'pending');
  }
}

// ==================== 渲染层卡片 ====================
function renderLayer(layer,idx){
  const icons={1:'📊',2:'📝',3:'🛡️',4:'🏷️',5:'🎮',6:'📈'};
  const levelMap={low_risk:'low-risk',medium_risk:'medium-risk',high_risk:'high-risk'};
  const details=(layer.details||[]).map(sec=>`<div style="margin-bottom:8px;"><div style="font-weight:600;margin-bottom:4px;color:var(--text);">${esc(sec.section)}</div><ul style="margin:0;padding-left:18px;">${(sec.items||[]).map(it=>`<li>${esc(it.label)}：<span class="${esc(it.cls||'')}">${esc(it.value)}</span></li>`).join('')}</ul></div>`).join('');
  const signals=(layer.signals||[]).slice(0,5).map(s=>`<li>${esc(s.text||'')}</li>`).join('');
  const risk=(layer.risk_keywords||[]).map(k=>`<span class="chip ${esc(k.type||'info')}">${esc(k.text||'')}</span>`).join('');
  const lvl=(layer.level||'medium-risk').replace('-','_');
  const cssLvl=levelMap[lvl]||'medium-risk';
  const ln=layer.layer_number||idx;
  const div=document.createElement('div');div.className=`layer ${cssLvl}`;
  div.id=`layer-${ln}`;
  div.innerHTML=`<div class="layer-hd"><span><span class="layer-icon">${icons[ln]||'📌'}</span> L${ln} · ${esc(layer.layer_name||'')}</span><span style="display:flex;align-items:center;gap:8px;">${fmtScore(layer.score)}<span class="badge ${cssLvl}">${esc(layer.level||'-')}</span><span class="layer-chevron">▼</span></span></div><div class="layer-bd">${details||'<div class="hint">暂无明细</div>'}${signals?`<div style="margin-top:6px;"><strong>关键风险信号：</strong><ul style="margin:4px 0 0;padding-left:18px;">${signals}</ul></div>`:''}${risk?`<div style="margin-top:8px;"><strong>风险关键词：</strong><div class="chip-wrap">${risk}</div></div>`:''}</div>`;
  div.querySelector('.layer-hd').addEventListener('click',()=>div.classList.toggle('open'));
  return div;
}

// ==================== 改动5: 展开/折叠全部 ====================
function setAllLayers(open){
  allLayersExpanded=open;
  document.querySelectorAll('.layer').forEach(l=>{if(open)l.classList.add('open');else l.classList.remove('open')});
  gid('expandAllBtn').style.display=open?'none':'';
  gid('collapseAllBtn').style.display=open?'':'none';
}

gid('expandAllBtn').addEventListener('click',()=>setAllLayers(true));
gid('collapseAllBtn').addEventListener('click',()=>setAllLayers(false));

// ==================== 渲染结果 & 页面切换 ====================
function renderResult(payload){
  const {result,creator,layers}=payload;currentScreenId=result?.id||'';

  // 页面切换：隐藏搜索 & 进度, 显示结果
  gid('searchView').classList.add('hidden');
  gid('screeningCard').classList.add('hidden');
  gid('batchResultPanel').classList.add('hidden');
  gid('resultView').classList.remove('hidden');

  // 评分仪表盘
  const score=result.composite_score??0;
  gid('scoreVal').textContent=score;
  const gauge=gid('gaugeArc');const peri=2*Math.PI*50;const dash=peri*score/100;
  gauge.setAttribute('stroke-dasharray',`${dash} ${peri-dash}`);
  gauge.setAttribute('stroke',score>=80?'var(--ok)':score>=40?'var(--warn)':'var(--bad)');
  gid('scoreVal').style.color=score>=80?'var(--ok)':score>=40?'var(--warn)':'var(--bad)');

  // 判定横幅
  const vb=gid('verdictBanner');const v=result.verdict;
  vb.className='verdict-banner '+(v==='approve'?'approve':v==='reject'?'reject':'review');
  vb.querySelector('div:last-child').textContent=v==='approve'?'✅ 建议合作':v==='reject'?'⛔ 建议拒绝':'🔍 需人工复核';
  gid('verdictVal').textContent='';

  // 创作者信息
  gid('creatorVal').textContent=creator.name||creator.handle||creator.url||'-';
  gid('platformVal').textContent=creator.platform||'-';
  gid('subsVal').textContent=creator.subs?Number(creator.subs).toLocaleString():'-';
  gid('countryVal').textContent=creator.country||'-';

  // 一票否决
  const veto=gid('vetoBlock');
  if(result.veto_flags&&result.veto_flags.length){
    veto.classList.remove('hidden');
    veto.innerHTML=`<strong>⚠️ 一票否决信号：</strong> ${result.veto_flags.map(v=>esc(v.text||v)).join('；')}`;
  }else{veto.classList.add('hidden')}

  // 渲染层卡片
  const layersBox=gid('layersBox');layersBox.innerHTML='';
  const iconMap={1:'📊',2:'📝',3:'🛡️',4:'🏷️',5:'🎮',6:'📈'};
  (layers||[]).forEach((l,i)=>{
    const card=renderLayer(l,i+1);
    layersBox.appendChild(card);
  });

  // 默认全部折叠
  setAllLayers(false);
  // 滚动到顶部
  gid('resultView').scrollIntoView({behavior:'smooth'});
}

// ==================== 返回搜索 ====================
function backToSearch(){
  gid('searchView').classList.remove('hidden');
  gid('screeningCard').classList.add('hidden');
  gid('resultView').classList.add('hidden');
  gid('batchResultPanel').classList.add('hidden');
  gid('urlInput').focus();
}
gid('backToSearch').addEventListener('click',backToSearch);
gid('backToSearch2').addEventListener('click',backToSearch);

// ==================== 筛查主流程 ====================
// 从 textarea 提取非空行
function getUrlLines(){
  return gid('urlInput').value.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
}

async function pollResult(screenId){
  gid('screeningCard').classList.remove('hidden');
  gid('batchResultPanel').classList.add('hidden');
  gid('resultView').classList.add('hidden');
  gid('screeningTitle').textContent='正在进行六层AI筛查';
  const stepsEl=gid('traceSteps');
  stepsEl.innerHTML=buildTraceSteps();

  for(let i=0;i<60;i++){
    const data=await fetch(`/api/screen/${screenId}`).then(r=>r.json());

    if(data.result?.status==='completed'){
      gid('screeningSub').textContent='✅ 六层筛查全部完成';
      updateTraceStep(60);
      await new Promise(r=>setTimeout(r,500));
      renderResult(data);
      return;
    }
    if(data.result?.status==='failed'){
      gid('screeningSub').textContent='筛查失败';
      return;
    }

    updateTraceStep(i);
    const phaseMsgs=[
      '正在获取频道基础数据...',
      '正在下载字幕并进行关键词扫描...',
      '正在运行政治敏感信号检测...',
      '正在计算品牌安全得分...',
      '正在分析竞品关联度...',
      '正在验证影响力真实性...',
    ];
    const msgIdx=Math.min(Math.floor(i/10),5);
    gid('screeningSub').textContent=phaseMsgs[msgIdx]||'处理中...';
    await new Promise(r=>setTimeout(r,1200));
  }
  gid('screeningSub').textContent='轮询超时，请稍后查看历史记录。';
}

async function runBatch(urls){
  // 生成 CSV Blob 并上传
  const csv='url\n'+urls.join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const fd=new FormData();fd.append('file',blob,'batch.csv');

  gid('searchView').classList.add('hidden');
  gid('resultView').classList.add('hidden');
  gid('screeningCard').classList.remove('hidden');
  gid('screeningTitle').textContent=`批量筛查 ${urls.length} 位创作者`;
  gid('screeningSub').textContent='正在提交批量任务...';
  gid('traceSteps').innerHTML='';

  const res=await fetch('/api/batch',{method:'POST',body:fd});
  const data=await res.json();
  if(!res.ok||!data.batch_id){
    gid('screeningSub').textContent='批量任务创建失败：'+(data.error||data.detail||'未知错误');
    return;
  }
  await pollBatchProgress(data.batch_id,urls.length);
}

async function pollBatchProgress(batchId,total){
  currentBatchId=batchId;
  gid('screeningSub').textContent=`批次 ${batchId} · 共 ${total} 条 · 轮询中...`;

  for(let i=0;i<80;i++){
    const p=await fetch(`/api/batch/${batchId}`).then(r=>r.json());
    const done=(p.completed_count||0)+(p.failed_count||0);
    const pct=p.total_count?Math.round(done*100/p.total_count):0;
    gid('screeningSub').textContent=`批次 ${batchId} · ${done}/${p.total_count||total} 已完成 · ${pct}%`;
    if(p.status==='completed'||p.status==='failed'||done>=(p.total_count||total)){
      gid('screeningCard').classList.add('hidden');
      gid('batchResultPanel').classList.remove('hidden');
      gid('batchStatusInline').textContent=`✅ 批次完成 · 成功 ${p.completed_count||0} · 失败 ${p.failed_count||0}`;
      gid('batchStatusInline').className='status ok';
      await loadBatchTable(batchId);
      return;
    }
    await new Promise(r=>setTimeout(r,1500));
  }
  gid('screeningCard').classList.add('hidden');
  gid('batchResultPanel').classList.remove('hidden');
  gid('batchStatusInline').textContent='⚠️ 轮询超时，部分任务可能仍在运行。';
  gid('batchStatusInline').className='status warn';
  await loadBatchTable(batchId);
}

async function loadBatchTable(batchId){
  const data=await fetch(`/api/batch/${batchId}/results`).then(r=>r.json());
  const tbody=gid('batchTbody');tbody.innerHTML='';
  (data.items||[]).forEach(item=>{
    const creator=item.name||item.handle||'Unknown';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(item.created_at||'')}</td><td>${esc(creator)}</td><td>${esc(item.platform||'')}</td><td>${esc(item.status||'')}</td><td>${fmtScore(item.composite_score)}</td><td>${esc(verdictText(item.verdict))}</td><td><button class="secondary" data-id="${esc(item.screen_id)}">查看</button></td>`;
    tr.querySelector('button').addEventListener('click',async(e)=>{
      const detail=await fetch(`/api/screen/${e.target.dataset.id}`).then(x=>x.json());
      backToSearch();
      // 走单条流程展示
      gid('searchView').classList.add('hidden');
      gid('batchResultPanel').classList.add('hidden');
      renderResult(detail);
    });
    tbody.appendChild(tr);
  });
}

gid('batchExportInline').addEventListener('click',()=>{
  if(currentBatchId) window.open(`/api/batch/${currentBatchId}/export`,'_blank');
});

gid('startBtn').addEventListener('click',async()=>{
  const urls=getUrlLines();
  if(!urls.length){alert('请输入至少一个 YouTube 创作者链接。');return;}
  if(urls.length===1){
    const res=await fetch('/api/screen',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:urls[0]})});
    const data=await res.json();
    if(!res.ok||!data.screen_id){alert('提交失败：'+(data.detail||data.error||'未知错误'));return;}
    gid('searchView').classList.add('hidden');
    gid('resultView').classList.add('hidden');
    gid('batchResultPanel').classList.add('hidden');
    await pollResult(data.screen_id);
  }else{
    await runBatch(urls);
  }
});

gid('singleExportBtn').addEventListener('click',()=>{
  if(!currentScreenId)return;
  window.open(`/api/screen/${currentScreenId}/export`,'_blank');
});

// ==================== 历史记录 ====================
async function loadHistory(){
  const q=gid('searchInput').value.trim();const v=gid('verdictFilter').value;
  const params=new URLSearchParams({page:'1',limit:'20'});
  if(q)params.set('search',q);if(v)params.set('verdict',v);
  const data=await fetch(`/api/history?${params}`).then(r=>r.json());
  const tbody=gid('historyTbody');tbody.innerHTML='';
  (data.items||[]).forEach(item=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(item.created_at||'')}</td><td>${esc(item.creator_name||'')}</td><td>${esc(item.platform||'')}</td><td>${fmtScore(item.composite_score)}</td><td>${esc(verdictText(item.verdict))}</td><td><button class="secondary" data-id="${esc(item.id)}">查看</button></td>`;
    tr.querySelector('button').addEventListener('click',async(e)=>{
      const detail=await fetch(`/api/screen/${e.target.dataset.id}`).then(r=>r.json());
      tabs[0].click();
      renderResult(detail);
    });
    tbody.appendChild(tr);
  });
}

gid('historyBtn').addEventListener('click',loadHistory);
